name: Deploy Job App to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting Deployment for Job-App..."
            cd /opt/job-platform/job-app
            git pull origin main
            
            echo "⚙️ Rebuilding Docker Containers..."
            cd /opt/job-platform
            docker compose up -d --build job-app
            
            echo "🧹 Clearing Application Cache..."
            docker exec job_app_web php artisan optimize:clear
            
            echo "🗑️ Auto-cleaning old Docker images to save VPS space..."
            docker image prune -f
            
            echo "✅ Deployment Successful!"